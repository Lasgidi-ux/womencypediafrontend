services:
  # ─── Strapi CMS Backend ────────────────────────────────
  - type: web
    name: womencypedia-cms
    runtime: node
    region: oregon
    plan: starter
    rootDir: womencypedia-cms
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_CLIENT
        value: postgres
      - key: DATABASE_HOST
        fromDatabase:
          name: womencypedia-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: womencypedia-db
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: womencypedia-db
          property: database
      - key: DATABASE_USERNAME
        fromDatabase:
          name: womencypedia-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: womencypedia-db
          property: password
      - key: DATABASE_SSL
        value: "true"
      # Render managed Postgres uses self-signed SSL certs — Node.js rejects them
      # by default. Connection is still encrypted (DATABASE_SSL=true). This is
      # Render's standard recommendation, not a workaround.
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: PUBLIC_URL
        sync: false
      - key: CLOUDINARY_NAME
        value: dn4iiwlub
      - key: CLOUDINARY_KEY
        value: "686395845783248"
      - key: CLOUDINARY_SECRET
        sync: false

  # ─── Frontend Static Site ──────────────────────────────
  - type: web
    name: womencypedia-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /dist/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /css/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /images/*
        name: Cache-Control
        value: public, max-age=86400
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com https://plausible.io https://cdn.jsdelivr.net https://js.paystack.co https://checkout.flutterwave.com https://unpkg.com https://app.launchdarkly.com https://d3js.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; img-src 'self' https: data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://womencypedia-cms.onrender.com https://plausible.io https://app.launchdarkly.com https://unpkg.com https://d3js.org; frame-src https://js.paystack.co https://checkout.flutterwave.com; worker-src 'self' blob:;"
      - path: /manifest.json
        name: Content-Type
        value: application/json

databases:
  - name: womencypedia-db
    plan: starter
    region: oregon
    databaseName: womencypedia
    user: womencypedia

